<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet">
    <title>Home</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-dark fw-normal" href="#">MeuProjeto</a>
            
            <button class="navbar-toggler border-dark" type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" 
                    aria-expanded="false" 
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-dark fw-normal active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark fw-normal" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark fw-normal" href="contatos.html">Contatos</a>
                    </li>
                </ul>
            </div>
            
            <div class="d-flex align-items-center gap-2">
                <button id="alternar-tema" type="button" class="btn btn-outline-dark">Alternar Tema</button>
                <button id="botao-carrinho" class="btn btn-outline-dark position-relative" onclick="toggleCarrinho()">🛒</button>
            </div>
        </div>
    </nav>

    <div id="popup-carrinho" class="popup-carrinho">
        <div class="popup-carrinho-conteudo">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Carrinho de Compras</h4>
                <button class="btn btn-close" onclick="toggleCarrinho()" aria-label="Fechar"></button>
            </div>
            <div id="lista-carrinho" class="lista-carrinho">
                <p class="text-center text-muted">Carrinho vazio</p>
            </div>
            <div class="carrinho-total">
                <h5>Total: <span id="total-carrinho">R$ 0,00</span></h5>
            </div>
            <div class="carrinho-botoes">
                <button class="btn btn-danger" onclick="limparCarrinho()">Limpar Carrinho</button>
                <button class="btn btn-success" onclick="finalizarCompra()">Comprar</button>
                
            </div>
        </div>
    </div>


    <div class="container mt-5">
        <h1 class="mb-4">Bem-vindo ao MeuProjeto</h1>
    </div>
    <div class="container mt-5">
        <h2>O que nossos clientes dizem</h2>
        <div class="row" id="lista-depoimentos"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
